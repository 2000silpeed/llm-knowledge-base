# 온톨로지 스키마 정의 (O1)
# 이 파일은 Kuzu 그래프 DB의 구조와 온톨로지 규칙을 정의합니다.
# 관계 타입, 노드 클래스, Action Type, 메타엣지 규칙이 포함됩니다.

# ─────────────────────────────────────────────────────
# 노드 클래스 (Node Tables)
# ─────────────────────────────────────────────────────
nodes:
  Concept:
    description: 지식 베이스의 핵심 개념 단위 (wiki/concepts/*.md 1:1 대응)
    properties:
      name: STRING          # 개념명 (PRIMARY KEY, slug 기준)
      summary: STRING       # 1~3문장 요약
      source_files: STRING  # JSON 직렬화된 출처 파일 목록
      last_updated: STRING  # ISO 날짜

  Domain:
    description: 개념이 속하는 도메인/분야 (마케팅, 기술, 경영 등)
    properties:
      name: STRING          # 도메인명 (PRIMARY KEY)
      description: STRING

  ActionType:
    description: AI가 개념에 대해 수행할 수 있는 동작 유형
    properties:
      name: STRING          # 동작명 (PRIMARY KEY)
      description: STRING   # 동작 설명
      prompt_template: STRING  # AI 호출 시 사용할 프롬프트 패턴

# ─────────────────────────────────────────────────────
# 관계 타입 (Edge Tables) — Concept → Concept
# ─────────────────────────────────────────────────────
edges:
  # 계층 공간 (Hierarchy)
  IS_A:
    from: Concept
    to: Concept
    description: A IS_A B — A는 B의 한 종류 (상속 관계)
    example: "RFM분석 IS_A 고객세분화기법"
    meta_rule: "IS_A이면 B의 속성·Action을 A가 상속"

  PART_OF:
    from: Concept
    to: Concept
    description: A PART_OF B — A는 B의 구성 요소 (합성 관계)
    example: "고객세분화 PART_OF 마케팅전략"
    meta_rule: "B를 이해하려면 A를 알아야 함"

  # 인과 공간 (Causal)
  ENABLES:
    from: Concept
    to: Concept
    description: A ENABLES B — A가 있으면 B가 가능해짐 (선행 조건)
    example: "고객세분화 ENABLES 개인화마케팅"

  REQUIRES:
    from: Concept
    to: Concept
    description: A REQUIRES B — A를 수행하려면 B가 필요 (의존 관계)
    example: "RFM분석 REQUIRES 구매이력데이터"

  PRECEDES:
    from: Concept
    to: Concept
    description: A PRECEDES B — A가 B보다 시간적·논리적으로 앞섬
    example: "시장조사 PRECEDES 포지셔닝전략"

  # 구조 공간 (Structural)
  CO_OCCURS:
    from: Concept
    to: Concept
    description: A CO_OCCURS B — A와 B가 함께 자주 등장하는 개념
    example: "브랜딩 CO_OCCURS 포지셔닝"
    properties:
      weight: DOUBLE        # 동시 출현 빈도 (0.0~1.0)

  # 갈등 공간 (Conflict)
  CONTRADICTS:
    from: Concept
    to: Concept
    description: A CONTRADICTS B — A와 B는 상충하거나 서로 다른 관점
    example: "대량마케팅 CONTRADICTS 개인화마케팅"
    properties:
      reason: STRING        # 상충 이유 요약

  # 예시 공간 (Exemplification)
  EXEMPLIFIES:
    from: Concept
    to: Concept
    description: A EXEMPLIFIES B — A는 B의 구체적 사례·예시
    example: "스타벅스리워드 EXEMPLIFIES 로열티프로그램"

  # 도메인 소속
  BELONGS_TO:
    from: Concept
    to: Domain
    description: 개념이 속하는 도메인

  # Action 적용 가능성
  SUPPORTS_ACTION:
    from: Concept
    to: ActionType
    description: 이 개념에 대해 수행 가능한 AI 동작

# ─────────────────────────────────────────────────────
# Action Type 목록
# ─────────────────────────────────────────────────────
action_types:
  query:
    description: 개념에 대한 심층 질의응답 수행
    prompt_template: "{{ concept }}에 대해 다음 질문에 답하세요: {{ question }}"

  compare:
    description: 두 개념 간 비교 분석
    prompt_template: "{{ concept_a }}와 {{ concept_b }}를 다음 기준으로 비교하세요: {{ criteria }}"

  apply:
    description: 개념을 특정 상황에 적용하는 방법 도출
    prompt_template: "{{ concept }}을 다음 상황에 어떻게 적용할 수 있는지 설명하세요: {{ situation }}"

  derive:
    description: 개념에서 새로운 인사이트 파생
    prompt_template: "{{ concept }}로부터 도출할 수 있는 핵심 인사이트 3가지를 제시하세요."

  summarize:
    description: 개념의 핵심을 간결하게 요약
    prompt_template: "{{ concept }}을 전문가가 아닌 사람에게 2~3문장으로 설명하세요."

# ─────────────────────────────────────────────────────
# 메타엣지 규칙 (관계에 대한 규칙)
# ─────────────────────────────────────────────────────
meta_edges:
  inheritance:
    description: IS_A 관계는 Action Type과 Domain을 상속
    rule: "IF (A)-[:IS_A]->(B) THEN A.actions ⊇ B.actions"
    cypher_hint: |
      MATCH (a:Concept)-[:IS_A]->(b:Concept)-[:SUPPORTS_ACTION]->(act:ActionType)
      MERGE (a)-[:SUPPORTS_ACTION]->(act)

  transitivity_part_of:
    description: PART_OF는 전이적 (A PART_OF B, B PART_OF C → A PART_OF C)
    rule: "IF (A)-[:PART_OF]->(B)-[:PART_OF]->(C) THEN (A)-[:PART_OF*]->(C)"
    cypher_hint: |
      MATCH (a:Concept)-[:PART_OF*1..5]->(c:Concept)
      RETURN a.name, c.name

  causal_chain:
    description: ENABLES + REQUIRES는 인과 체인 구성
    rule: "A ENABLES B, B REQUIRES C → C는 A의 간접 의존 대상"
    cypher_hint: |
      MATCH (a:Concept)-[:ENABLES*1..3]->(b:Concept)
      RETURN a.name, collect(b.name) AS downstream

  conflict_symmetry:
    description: CONTRADICTS는 대칭 관계 (A ↔ B)
    rule: "IF (A)-[:CONTRADICTS]->(B) THEN (B)-[:CONTRADICTS]->(A)"
