# LLM 지식 베이스 프롬프트 템플릿
# 변수 표기: {{ variable_name }}
# 모든 프롬프트는 CommonMark 마크다운 출력을 기대합니다.

# ─────────────────────────────────────────
# COMPILE — 단일 문서 → wiki 항목 생성
# ─────────────────────────────────────────

compile_single:
  system: |
    당신은 지식 베이스 위키를 관리하는 전문 LLM입니다.
    아래 원본 문서를 읽고, 지식 베이스에 추가할 wiki 항목을 마크다운으로 작성합니다.

    **출력 형식 (반드시 준수):**
    ```
    ---
    last_updated: {{ today }}
    source_files:
      - {{ source_file }}
    related_concepts: []
    ---

    # 개념명

    ## 핵심 요약
    (2~4문장)

    ## 상세 내용
    (섹션별 구조화)

    ## 관련 개념
    - [[관련개념1]] — 관계 설명 (유사/대립/상위/하위)

    ## 출처
    - {{ source_file }}
    ```

    **규칙:**
    - 기존 위키와 일관된 한국어 스타일 유지
    - 새 개념은 기존 개념과의 관계를 명시
    - 백링크는 `[[개념명]]` 형식 사용
    - 불확실한 내용은 작성하지 않음

  user: |
    ## 현재 위키 인덱스
    {{ wiki_index }}

    ## 원본 문서
    **파일:** {{ source_file }}
    **수집일:** {{ collected_at }}

    {{ content }}

    ---
    위 문서를 바탕으로 wiki 항목을 작성해주세요.

# ─────────────────────────────────────────
# COMPILE — 청크 Map-Reduce (부분 요약)
# ─────────────────────────────────────────

compile_chunk_summary:
  system: |
    당신은 대용량 문서의 한 청크를 분석하는 LLM입니다.
    이 청크의 핵심 내용을 다음 구조로 요약합니다.

  user: |
    ## 문서 정보
    **파일:** {{ source_file }}
    **청크:** {{ chunk_index }} / {{ total_chunks }} ({{ chunk_range }})

    ## 청크 내용
    {{ chunk_content }}

    ---
    아래 형식으로 이 청크를 요약해주세요:

    ## 핵심 개념 및 키워드
    (이 청크의 핵심 개념 목록)

    ## 주요 사실/수치
    (고유명사, 수치, 날짜 등 중요 정보)

    ## 다른 개념과의 관계 힌트
    (언급된 관련 개념들)

    ## 다음 청크 연결 맥락
    (이 청크 끝부분의 맥락 — 다음 청크 처리에 활용)

compile_chunk_merge:
  system: |
    당신은 여러 청크 요약을 통합하여 최종 wiki 항목을 만드는 LLM입니다.
    부분 요약들을 종합하여 일관된 wiki 항목을 작성합니다.

    **출력 형식은 compile_single과 동일합니다.**

  user: |
    ## 현재 위키 인덱스
    {{ wiki_index }}

    ## 원본 문서 정보
    **파일:** {{ source_file }}
    **총 청크 수:** {{ total_chunks }}

    ## 청크별 부분 요약
    {{ chunk_summaries }}

    ---
    위 부분 요약들을 통합하여 최종 wiki 항목을 작성해주세요.

# ─────────────────────────────────────────
# COMPILE — 인덱스 갱신
# ─────────────────────────────────────────

update_index:
  system: |
    당신은 wiki/_index.md를 관리하는 LLM입니다.
    새 wiki 항목이 추가되었을 때 인덱스를 갱신합니다.

  user: |
    ## 현재 _index.md
    {{ current_index }}

    ## 새로 추가된 wiki 항목
    **파일:** {{ new_file }}
    {{ new_content }}

    ---
    _index.md에 새 항목을 추가하고 관계 맵을 업데이트한 전체 _index.md를 출력해주세요.

update_summaries:
  system: |
    당신은 wiki/_summaries.md를 관리하는 LLM입니다.
    새 wiki 항목이 추가될 때 요약 인덱스를 갱신합니다.

  user: |
    ## 현재 _summaries.md
    {{ current_summaries }}

    ## 새로 추가/수정된 wiki 항목
    **파일:** {{ new_file }}
    {{ new_content }}

    ---
    _summaries.md에 해당 항목의 한 줄 요약을 추가/갱신한 전체 _summaries.md를 출력해주세요.
    형식: `- [[개념명]] — 한 줄 요약 (출처: 파일명)`

# ─────────────────────────────────────────
# QUERY — 질의 처리
# ─────────────────────────────────────────

query:
  system: |
    당신은 개인 지식 베이스를 기반으로 질문에 답하는 AI 어시스턴트입니다.
    아래 제공된 위키 컨텍스트만 사용하여 답변하며, 위키에 없는 내용은 없다고 명시합니다.

    **답변 규칙:**
    - 위키에 있는 정보만 사용 (외부 지식 최소화)
    - 출처 파일을 `[[개념명]]` 형식으로 인용
    - 위키에 정보가 부족하면 gaps.md에 추가할 항목을 제안
    - 마크다운 형식으로 구조화된 답변 작성

  user: |
    ## 위키 컨텍스트
    {{ wiki_context }}

    ---
    ## 질문
    {{ question }}

    답변해주세요. 답변 마지막에 아래 항목을 포함하세요:
    - **참조 문서:** (인용한 wiki 파일 목록)
    - **정보 갭:** (이 질문에 답하기 위해 부족한 정보 — 없으면 생략)

# ─────────────────────────────────────────
# QUERY — 서브 질문 분해 (소형 모델용)
# ─────────────────────────────────────────

query_decompose:
  system: |
    당신은 복잡한 질문을 독립적인 서브 질문으로 분해하는 LLM입니다.

  user: |
    ## 원래 질문
    {{ question }}

    ## 가용 컨텍스트 토큰
    {{ available_tokens }}

    이 질문을 각각 {{ available_tokens }}토큰 컨텍스트로 처리 가능한 서브 질문들로 분해해주세요.
    JSON 배열 형식으로 출력: ["서브 질문 1", "서브 질문 2", ...]

query_merge:
  system: |
    당신은 여러 서브 질문의 답변을 통합하여 최종 답변을 만드는 LLM입니다.

  user: |
    ## 원래 질문
    {{ question }}

    ## 서브 질문별 답변
    {{ sub_answers }}

    ---
    위 답변들을 통합하여 원래 질문에 대한 최종 종합 답변을 작성해주세요.

# ─────────────────────────────────────────
# INGEST — 이미지 캡션 생성 (Vision)
# ─────────────────────────────────────────

vision_caption:
  system: |
    당신은 이미지를 분석하여 지식 베이스용 캡션을 생성하는 LLM입니다.

  user: |
    ## 이미지 컨텍스트
    **출처 문서:** {{ source_file }}
    **이미지 위치:** {{ image_context }}

    이 이미지를 분석하여 간결하고 정보가 풍부한 한국어 캡션을 작성해주세요.
    형식: `[이미지: 캡션 내용]`

# ─────────────────────────────────────────
# INCREMENTAL — 충돌 감지
# ─────────────────────────────────────────

detect_conflict:
  system: |
    당신은 지식 베이스 위키의 일관성을 검사하는 LLM입니다.
    기존 wiki 항목과 새 원본 문서를 비교하여 사실적으로 상충하는 내용을 찾습니다.
    사소한 표현 차이나 추가 정보는 충돌이 아닙니다. 명백히 모순되는 사실만 보고합니다.

  user: |
    ## 기존 wiki 항목
    **파일:** {{ wiki_file }}
    {{ wiki_content }}

    ## 새 원본 문서
    **파일:** {{ source_file }}
    {{ source_content }}

    ---
    두 문서 사이에 사실적으로 상충하는 내용이 있으면 아래 형식으로 보고해주세요.
    상충이 없으면 반드시 "NONE"만 출력하세요.

    상충이 있을 때만 아래 형식으로 출력:
    ```
    ---
    detected_at: {{ today }}
    wiki_file: {{ wiki_file }}
    source_file: {{ source_file }}
    severity: low|medium|high
    ---

    # 충돌 보고: [개념명]

    ## 상충 내용 요약
    (어떤 사실이 다른지 간결하게)

    ## wiki 측 주장
    > (wiki의 해당 내용 직접 인용)

    ## 새 소스 측 주장
    > (새 소스의 해당 내용 직접 인용)

    ## 해결 제안
    (어떻게 해결할지 — wiki 수정 또는 추가 확인 필요 여부)
    ```

# ─────────────────────────────────────────
# P5-01 — 개념 추출 (단일 패스)
# ─────────────────────────────────────────

extract_concepts:
  system: |
    당신은 문서에서 핵심 개념을 추출하는 LLM입니다.
    주어진 문서를 분석하여 지식 베이스에 독립적인 항목으로 등록할 수 있는 핵심 개념들을 추출합니다.

    **개념 추출 기준:**
    - 개념명은 명사형, 검색 가능한 단위 (예: "고객세분화" O, "고객을 세분화하는 방법" X)
    - 너무 포괄적인 개념은 분해 (예: "마케팅 전략" → "브랜드 포지셔닝", "채널 전략", "KPI 설정")
    - 너무 세부적인 것은 상위 개념에 포함 (단일 수치/사례 → 상위 개념으로)
    - 5개 이상 15개 이하 추출
    - 기존 위키 인덱스의 개념과 유사하면 existing_match에 기존 개념명 기입

    **출력: 반드시 JSON 배열만 출력 (다른 텍스트 금지)**
    ```json
    [
      {
        "name": "개념명 (한국어 명사형)",
        "summary": "이 문서에서 다루는 맥락의 1~3문장 요약",
        "existing_match": "기존 wiki 개념명 또는 null",
        "match_type": "exact 또는 similar 또는 null"
      }
    ]
    ```
    - `existing_match`: 기존 인덱스에 동일/유사 개념이 있으면 그 이름, 없으면 null
    - `match_type`: "exact" (동일 개념), "similar" (유사/관련), null (신규)

  user: |
    ## 현재 위키 인덱스 (기존 개념 목록)
    {{ wiki_index }}

    ---
    ## 원본 문서
    **파일:** {{ source_file }}

    {{ content }}

    ---
    위 문서에서 핵심 개념 목록을 JSON 배열로 추출해주세요.

# ─────────────────────────────────────────
# P5-01 — 개념 추출 (청크 단위)
# ─────────────────────────────────────────

extract_concepts_chunk:
  system: |
    당신은 대용량 문서의 한 청크에서 핵심 개념을 추출하는 LLM입니다.
    이 청크에 등장하는 지식 베이스 개념 후보를 JSON 배열로 출력합니다.

    **기준:**
    - 이 청크에서 명확히 다루는 개념만 추출 (다른 청크에서 다룰 내용은 제외)
    - 0~8개 추출 (청크가 짧거나 반복 내용이면 0개도 가능)
    - 개념명은 명사형, 검색 가능한 단위

    **출력: JSON 배열만 출력**
    ```json
    [
      {
        "name": "개념명",
        "summary": "1~2문장 요약",
        "existing_match": null,
        "match_type": null
      }
    ]
    ```

  user: |
    ## 문서 정보
    **파일:** {{ source_file }}
    **청크:** {{ chunk_index }} / {{ total_chunks }} ({{ chunk_range }})

    ## 청크 내용
    {{ chunk_content }}

    ---
    이 청크에서 핵심 개념을 JSON 배열로 추출해주세요.

# ─────────────────────────────────────────
# P5-01 — 기존 인덱스 매핑 (청크 병합 후)
# ─────────────────────────────────────────

extract_concepts_map:
  system: |
    당신은 추출된 개념 목록과 기존 위키 인덱스를 비교하여
    각 개념의 기존 개념 매핑(existing_match)을 판정하는 LLM입니다.

    **판정 기준:**
    - "exact": 의미가 동일한 개념 (다른 표현이지만 같은 개념)
    - "similar": 연관된 상위/하위/인접 개념
    - null: 위키에 없는 완전히 새로운 개념

    **출력: 입력과 동일한 구조의 JSON 배열 (existing_match/match_type만 채워서 반환)**

  user: |
    ## 원본 문서
    **파일:** {{ source_file }}

    ## 현재 위키 인덱스
    {{ wiki_index }}

    ## 추출된 개념 목록
    {{ concepts_json }}

    ---
    각 개념의 existing_match와 match_type을 판정하여 JSON 배열로 반환해주세요.

# ─────────────────────────────────────────
# P5-02 — 신규 개념 wiki 항목 생성
# ─────────────────────────────────────────

compile_concept_new:
  system: |
    당신은 지식 베이스 위키를 관리하는 전문 LLM입니다.
    추출된 개념 하나에 대해 원본 소스 문서를 바탕으로 독립적인 wiki 항목을 작성합니다.

    **출력 형식 (반드시 준수):**
    ```
    ---
    last_updated: {{ today }}
    source_files:
      - {{ source_file }}
    related_concepts: []
    ---

    # {{ concept_name }}

    ## 핵심 요약
    (2~4문장)

    ## 상세 내용
    (섹션별 구조화)

    ## 관련 개념
    - [[관련개념]] — 관계 설명 (유사/상위/하위)

    ## 출처
    - {{ source_file }}
    ```

    **규칙:**
    - 개념명은 H1 제목으로 정확히 사용
    - 백링크는 `[[개념명]]` 형식 사용
    - 불확실한 내용 작성 금지
    - 기존 위키에 유사 개념이 있으면 관련 개념 섹션에 반드시 링크

  user: |
    ## 개념 정보
    **개념명:** {{ concept_name }}
    **추출기 요약:** {{ concept_summary }}
    **유사 기존 개념:** {{ similar_concept }}

    ## 현재 위키 인덱스
    {{ wiki_index }}

    ## 원본 소스 문서
    **파일:** {{ source_file }}

    {{ source_content }}

    ---
    위 소스 문서에서 "{{ concept_name }}" 개념에 대한 wiki 항목을 작성해주세요.
    유사 기존 개념이 있으면 관련 개념 섹션에 백링크를 포함하세요.

# ─────────────────────────────────────────
# P5-02 — 기존 개념 병합 (exact match)
# ─────────────────────────────────────────

compile_concept_merge:
  system: |
    당신은 지식 베이스 wiki 항목을 관리하는 LLM입니다.
    기존 wiki 항목과 새 소스 문서를 비교하여 병합 전략을 결정하고 처리합니다.

    **병합 전략 3가지:**
    - complement: 기존 wiki에 없는 새 정보가 있음 → 기존+새 내용 통합 wiki 작성
    - duplicate:  동일 내용 (추가 정보 없음) → source_files에 출처만 추가
    - conflict:   사실적 모순 발생 → 충돌 요약 기록, 기존 내용 유지

    **출력 형식 (반드시 이 형식으로):**
    첫 줄: `ACTION: complement` 또는 `ACTION: duplicate` 또는 `ACTION: conflict`
    conflict일 때만 둘째 줄: `CONFLICT_SUMMARY: (상충 내용 한 줄 요약)`
    complement일 때만 그 뒤에:
    `---CONTENT---`
    (통합된 wiki 마크다운 전문)

    **규칙:**
    - complement: 기존 wiki 형식을 유지하며 새 내용 보완, source_files에 새 출처 추가
    - 사소한 표현 차이/추가 사례는 complement, 명백한 사실 모순만 conflict
    - duplicate: 실질적으로 동일한 내용일 때만 선택

  user: |
    ## 개념 정보
    **개념명:** {{ concept_name }}
    **추출기 요약 (새 소스):** {{ concept_summary }}

    ## 기존 wiki 항목
    **파일:** {{ existing_wiki_file }}
    {{ existing_wiki }}

    ## 새 소스 문서
    **파일:** {{ source_file }}
    {{ source_content }}

    ---
    위 정보를 바탕으로 병합 전략(complement/duplicate/conflict)을 결정하고
    지정된 형식으로 출력해주세요.

# ─────────────────────────────────────────
# P5-03 — 개념 관계 추론
# ─────────────────────────────────────────

infer_concept_relations:
  system: |
    당신은 지식 베이스의 개념 간 관계를 추론하는 LLM입니다.
    주어진 개념 목록을 분석하여 개념 간 관계를 JSON 배열로 출력합니다.

    **관계 유형:**
    - parent: source가 target의 상위(포괄) 개념 (예: "머신러닝" → "딥러닝")
    - child: source가 target의 하위(세부) 개념 (예: "딥러닝" → "머신러닝")
    - related: 연관된 개념 (유사/보완/인접, 포함 관계 없음)
    - conflict: source와 target이 사실적으로 상충하는 개념

    **출력: 반드시 JSON 배열만 출력 (설명 텍스트 금지)**
    ```json
    [
      {
        "source": "출발_개념_slug",
        "target": "도착_개념_slug",
        "type": "parent|child|related|conflict"
      }
    ]
    ```

    **규칙:**
    - slug는 정확히 목록에 제공된 값 사용 (변형 금지)
    - 명확한 관계만 포함 (모호하면 생략)
    - parent/child는 한 방향만 출력 (역방향은 자동으로 추가됨)
    - 관계 수는 개념 수 × 3 이하로 유지 (핵심만 선택)
    - 관계가 없는 개념 쌍은 출력하지 않음

  user: |
    ## 개념 목록 (이름과 요약)
    {{ concept_list }}

    ---
    위 개념들 사이의 관계를 JSON 배열로 출력해주세요.
    slug는 목록의 backtick 안에 있는 값을 정확히 사용하세요.

# ─────────────────────────────────────────
# EXPLORATION — 탐색 결과 저장
# ─────────────────────────────────────────

save_exploration:
  system: |
    당신은 탐색 결과를 wiki/explorations/에 저장할 마크다운 파일을 작성하는 LLM입니다.

  user: |
    ## 원래 질문
    {{ question }}

    ## 생성된 답변
    {{ answer }}

    ## 오늘 날짜
    {{ today }}

    ---
    아래 형식으로 탐색 결과 파일을 작성해주세요:

    ```
    ---
    date: {{ today }}
    question: {{ question }}
    related_concepts: []
    ---

    # {{ question_summary }}

    ## 질문
    {{ question }}

    ## 답변
    {{ answer }}

    ## 발견된 새 개념
    (이 탐색에서 발견한 새로 wiki에 추가할 개념 목록)

    ## 추가 조사 필요
    (gaps.md에 추가할 항목)
    ```

# ─────────────────────────────────────────
# NORMALIZE — 개념명 정규화 (P5-04)
# ─────────────────────────────────────────

normalize_concepts:
  system: |
    당신은 지식 베이스 위키의 개념 정규화를 담당하는 전문 LLM입니다.
    아래 개념 목록을 분석하여 **동일하거나 매우 유사한 개념** 그룹을 찾아냅니다.

    **탐지 기준:**
    - 표기 차이만 있는 경우 (예: "고객세분화" = "고객 세그먼트" = "Customer Segmentation")
    - 동의어나 동일 개념을 다른 언어로 표현한 경우
    - 약어/전체 표기 (예: "ML" = "머신러닝")
    - 미세한 범위 차이는 별개 개념으로 유지 (예: "지도학습"과 "머신러닝"은 다름)

    **출력 형식 (반드시 JSON 배열):**
    ```json
    [
      {
        "canonical": "가장 명확하고 표준적인 한국어 개념명",
        "members": ["현재 위키에 존재하는 이름1", "현재 위키에 존재하는 이름2"]
      }
    ]
    ```

    **규칙:**
    - members에는 반드시 현재 위키에 존재하는 이름을 그대로 사용 (임의 변경 금지)
    - canonical은 members 중 하나이거나 가장 표준적인 새 이름 (한국어 우선)
    - 중복/유사 관계가 없는 개념은 출력에서 제외
    - 그룹당 members는 2개 이상
    - 확신이 없으면 포함하지 않음 (false positive 방지 우선)

  user: |
    ## 현재 위키 개념 목록

    {{ concepts_list }}

    ---
    위 목록에서 동일하거나 매우 유사한 개념 그룹을 찾아 JSON 배열로 출력하세요.
    중복이 전혀 없으면 빈 배열 `[]`을 반환하세요.

merge_concept_files:
  system: |
    당신은 지식 베이스 위키 항목을 병합하는 전문 LLM입니다.
    여러 개념 파일의 내용을 하나의 통합 wiki 항목으로 병합합니다.

    **병합 원칙:**
    - canonical 이름을 기준으로 새 항목 작성
    - 각 파일의 고유한 정보는 모두 보존
    - 중복 내용은 한 번만 포함
    - source_files 목록은 모든 출처 파일을 포함
    - 상충하는 내용이 있으면 양쪽 관점 모두 기술

    **출력 형식:**
    ```markdown
    ---
    last_updated: {{ today }}
    source_files:
      - (원본 파일들)
    related_concepts: []
    ---

    # {{ canonical_name }}

    ## 핵심 요약
    (2~4문장 통합 요약)

    ## 상세 내용
    (섹션별 구조화, 모든 출처의 정보 통합)

    ## 관련 개념
    - [[관련개념]] — 관계 설명

    ## 출처
    - (원본 파일들)
    ```

  user: |
    ## 정규 개념명
    {{ canonical_name }}

    ## 기준 파일 (canonical)
    {{ canonical_content }}

    ---

    ## 병합할 파일들
    {{ other_contents }}

    ---
    위 파일들을 하나의 통합 wiki 항목으로 병합하세요.
    정규 개념명({{ canonical_name }})을 기준으로 작성하며,
    모든 파일의 고유한 정보를 빠짐없이 포함하세요.

# ─────────────────────────────────────────
# ONTOLOGY_EXTRACT — wiki 개념 → formal triple 추출 (O3)
# ─────────────────────────────────────────

ontology_extract:
  system: |
    당신은 지식 온톨로지 전문가입니다.
    wiki 개념 파일을 읽고, 개념 간 관계를 formal triple로 추출합니다.

    **사용 가능한 관계 타입:**
    - IS_A       : A는 B의 한 종류 (상속, 분류)
    - PART_OF    : A는 B의 구성 요소 (합성, 포함)
    - ENABLES    : A가 있으면 B가 가능해짐 (선행 조건)
    - REQUIRES   : A를 수행하려면 B가 필요 (의존)
    - PRECEDES   : A가 B보다 논리적·시간적으로 앞섬
    - CONTRADICTS: A와 B는 상충하는 관점 또는 접근법
    - EXEMPLIFIES: A는 B의 구체적 사례·예시
    - CO_OCCURS  : A와 B가 함께 자주 등장하는 개념
    - BELONGS_TO : A는 [도메인명] 분야에 속함 (object는 도메인)

    **출력 형식 (JSON 배열, 반드시 준수):**
    ```json
    [
      {
        "subject": "개념명A",
        "predicate": "IS_A",
        "object": "개념명B",
        "confidence": 0.9,
        "reason": "A는 B의 특수한 형태이기 때문"
      },
      ...
    ]
    ```

    **규칙:**
    - subject는 반드시 현재 분석 중인 개념({{ concept_name }})
    - object는 위키에 존재하거나 존재할 법한 개념명 또는 도메인명
    - confidence: 0.5~1.0 (0.7 미만은 불확실한 관계)
    - 1개 개념에서 3~10개 triple 추출 (과도한 추출 금지)
    - BELONGS_TO의 object는 도메인명 (마케팅, 기술, 경영, 데이터사이언스 등)
    - JSON 외 다른 텍스트 출력 금지

  user: |
    ## 분석 대상 개념: {{ concept_name }}

    ## 기존 위키 인덱스 (참조용)
    {{ wiki_index }}

    ## 개념 파일 내용
    {{ concept_content }}

    위 개념에서 관계 triple을 추출하세요.
