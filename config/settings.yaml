# LLM 지식 베이스 시스템 설정
# ⚠️  모델을 바꿀 때는 llm 섹션만 수정하면 전체 파이프라인이 자동 적응됩니다.

llm:
  provider: anthropic        # anthropic | ollama
  model: claude-sonnet-4-6
  context_limit: 200000     # 실제 모델 입력 한도 (토큰)
  output_reserved: 8000     # LLM 출력용 예약 토큰
  prompt_reserved: 3000     # 시스템 프롬프트용 예약 토큰
  # → 가용 컨텐츠 토큰: 189,000  (자동 계산: context_limit - output_reserved - prompt_reserved)
  temperature: 0.3          # 위키 생성은 일관성 우선 → 낮게 설정
  api_key_env: ANTHROPIC_API_KEY

# ── Anthropic 소형 모델 (아래 주석 해제 후 위 llm 블록과 교체) ──
# llm:
#   provider: anthropic
#   model: claude-haiku-4-5-20251001
#   context_limit: 48000
#   output_reserved: 4000
#   prompt_reserved: 2000
#   temperature: 0.3
#   api_key_env: ANTHROPIC_API_KEY

# ── Ollama 로컬 모델 ──
# 사전 준비: ollama serve  &&  ollama pull gemma3:4b
# llm:
#   provider: ollama
#   model: gemma3:4b          # gemma3:4b | gemma3:27b | llama3.2:3b | mistral 등
#   base_url: http://localhost:11434
#   context_limit: 128000
#   output_reserved: 4000
#   prompt_reserved: 2000
#   temperature: 0.3

# ── Z.ai (GLM 모델) ──
# 사전 준비: export Z_AI_API_KEY='your-key'
# llm:
#   provider: openai           # OpenAI 호환 엔드포인트 사용
#   model: glm-4.5-air         # glm-4.5-air | glm-4.5 | glm-z1-air 등
#   base_url: https://chat.z.ai/api
#   api_key_env: Z_AI_API_KEY
#   context_limit: 128000
#   output_reserved: 4000
#   prompt_reserved: 2000
#   temperature: 0.3

# ── 기타 OpenAI 호환 서비스 (Groq, Together AI, 01.AI 등) ──
# llm:
#   provider: openai
#   model: <모델명>
#   base_url: <서비스 API URL>
#   api_key_env: <API 키 환경변수명>
#   context_limit: 131072
#   output_reserved: 4000
#   temperature: 0.3

chunking:
  # 청킹 전략 임계값 (가용 토큰 대비 비율)
  single_pass_threshold: 0.80    # ≤ 80%  → 단일 패스 (그대로 전달)
  map_reduce_threshold: 3.00     # ≤ 300% → Map-Reduce 청크 분할
  # 300% 초과 → 계층적 요약 트리

  overlap_tokens: 200            # 청크 간 overlap (앞 청크 마지막 200토큰)
  min_chunk_tokens: 500          # 최소 청크 크기 (너무 잘게 쪼개기 방지)

  # Office 파일별 청킹 단위
  excel_rows_per_chunk: 1000     # Excel: 시트 내 행 기준
  ppt_slides_per_chunk: 10       # PPT: 슬라이드 단위

paths:
  raw: raw
  wiki: wiki
  config: config
  scripts: scripts
  hash_store: .kb_hashes.json    # 증분 컴파일용 파일 해시 저장 경로

ingest:
  image_download: true           # 외부 이미지 URL → 로컬 raw/images/ 저장 여부
  vision_caption: true           # 이미지 → Claude Vision API 캡션 자동 생성
  slide_render: true             # PPT 슬라이드 전체 이미지 렌더링 + Vision 분석 (LibreOffice 필요)
  lang_priority:                 # YouTube 자막 언어 우선순위 (앞에서부터 시도)
    - ko
    - en
    - ja
    - zh-Hans
    - zh-Hant

# PPT 슬라이드 시각 분석 전용 Vision LLM
# 없으면 기본 llm 설정 사용. Gemma 4 멀티모달 권장.
# 사전 준비: ollama serve  &&  ollama pull gemma3:4b (또는 gemma4 출시 후 업데이트)
vision_llm:
  provider: ollama
  model: gemma3:4b               # 멀티모달 지원 모델 (llava, gemma3, 등)
  base_url: http://localhost:11434

wiki:
  auto_commit: true   # 컴파일 완료 후 wiki/ 변경 파일 자동 git commit (git repo 필요)

ontology:
  auto_load: false    # 컴파일 완료 후 Kuzu 그래프 자동 적재 (kb graph init 후 true로 설정)
  query_inject: true  # kb query 시 온톨로지 컨텍스트 자동 주입 (O6)
  budget_ratio: 0.15  # 온톨로지 컨텍스트에 할당할 토큰 비율 (전체의 15%)
  max_concepts: 3     # 질의당 그래프 확장할 최대 개념 수

cache:
  enabled: true       # LLM 응답 캐싱 활성화 (동일 입력 → API 미호출 → 비용 절감)
  ttl_days: 0         # 캐시 유효 기간 (일). 0 = 영구 보존, 30 = 30일 후 만료
  # 캐시 저장 위치: .kb_cache/ (자동)

logging:
  level: INFO                    # DEBUG / INFO / WARNING / ERROR
  file: .kb.log
